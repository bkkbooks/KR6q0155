front:
  text: 禪林寶訓拈頌序夫學不稽訓不博問不考訓不審思不覈訓不慎辨不詳訓不明行不依訓不篤則所以寶重之者革凡就聖之規繩也議謂律設大法理順人情從來洒洒落落奚必拘繫之若是咦世間最難收拾莫如付受侶儔仰面罔見天低頭罔見地由他縱放山川渾無制馭却像超宗模樣追乎履踐只淹沉嗜欲混俗同塵反推諉之為度眾生或誇張之為弘祖道并賣弄之為廣化緣雖照冊本話著一時謊彼庸愚寧禁智者絕倒耶請觀承任輩常在途中京三汴四覓個遵古誡契古機堪作後昆儀軌抑亦鮮矣都因怠於實學胡拈近似而恣論談失於咨詢亂扯陳辭而懜葢覆晨昏思出納生死事撩過半邊逢辨難即瞋顢頇去誑欺自己至行之節文惟踞伽藍抄語錄傳授幾緇衣而已熟察及此禪門日敗真信日微皆影響之流傚相積敝致然宜據往昔明教嵩圓通訥諸老諄諄訓誨始獲挽惡習回善心復隆風範於淳庥苟有負英俊才具鑑別眼看破慧雲撥邪返正之隱懷庶幾寬博其量精審其衷謹慎以安居光明以應物豈不確確焉敦厚以崇禮者哉謾擬茲纂搜刮諸方病痛太煞傷筋而訂定和尚箴銘尤嫌掣肘噫當泛濫之秋妖魔徧野非燥烈之士發洪誓秉威權毅然傑立于聲色貨利之表爭能果敢決裁將舊載四十二位尊宿之德言義句撮要而拈頌之修葺七十四首使共躅齊眉識些好惡遽云雪上加霜切恐凍殺年少呵呵甲午春王臨濟正宗第三十二世慧雲寺住持褎翁行盛謹撰
