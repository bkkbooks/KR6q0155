body:
  text: 武林慧雲禪寺褎翁行盛著侍者超記錄門人張文嘉顧如晉同較明教嵩云聖賢之學非一日之具日不足繼之以夜積之歲月自然可成拈云老僧精究二十餘載庶得虗豁豁地頌云徹透淵微念在茲年新月舊護加持若論篤志焚膏繼展播當前眾始知圓通訥云予平生行知止之計不以聲利自累若厭于心何日而足拈云知止自能安分而忙忙負累皆不厭心故也頌云屏除聲色得常樂放適雲中飛野鶴縱有矰縈難絆覊青天萬里虗寥廓圓通云林下人自無所守挾外勢以為重者一旦失其所挾不免顛溺之患拈云自作自受無解捄又云蹈挾勢之轍者作速改途為妙頌云謹守僧家分所宜趨權附勢涉虗危至其罹禍患遭厄怨命尤人癡更癡大覺璉云人不學不知道前輩立身揚名於當世者鮮不學問而成拈云身名賴學問造就亦有無學問而顯揚者吾不知其何據也頌云踞位稱師才與智並非淺學堪招致典型猶藉宿𦒿成機巧豎孺終誤事棲賢舜謂浮山遠云欲究無上妙道窮則益堅老當益壯不可循俗苟竊聲利自喪至德拈云道德自治難與今時流俗阿師言也頌云礪身全節貴精勤義理安居粹見聞寧似盜名欺誑輩貪營小利亂紛紜遠公謂道吾真云學未至於道衒耀見聞馳騁機解以口舌辨利相勝者猶如廁屋塗污丹雘祇增其臭耳拈云油嘴禪和堪作何用頌云依稀道聽而塗說斷不象牙生狗舌醜婦由他倣效顰無鹽刻畫返添拙五祖演謂佛鑑云住持之要臨眾貴在豐盈處己務從簡約其餘細碎悉勿關心拈云損己益眾衲僧常分而繫念嬴餘者殆庸鄙耳濫稱住持愧殺愧殺又云除是炤顧本等方能與此頌云秉令尊嚴法道行隨家豐儉悉真誠心公豈作肥私計受用便宜折脚鐺五祖云今時叢林學道之士身名不揚匪為人所信者葢為梵行不清白為人不諦當輙苟求名聞利養衒其華飾遂被識者所譏拈云不楷當之者專在名利上作活斥逐之可也頌云垢污混同猪豕畜謾言篾束篐腸腹但其現世恣憨耽羞殺少林分骨肉白雲端謂楊次公云可言不可行不若勿言可行不可言不若勿行發言必慮其所終立行必稽其所蔽拈云言行相顧便可謂之普賢王矣頌云學識淵深慮事周一番肅殺一番秋凝然表裏渾無二凭向市街輥繡毬白雲云道之隆替豈常耶在人弘之故操則存捨則亡然非道去人而人去道也拈云遇去道之人則衰替在邇可不慎乎頌云賢者興而愚者敗弘尤待真英邁揭明微旨太陽輝白日爭容迷鬼怪白雲云多見衲子未甞經及遠大之計予恐叢林自此衰薄矣楊岐先師每言上下偷安最為法門大患拈云偷安則不思遠大敗壞法門皆始於此又云宵小僭竊成何統紀而無有個感慨耶頌云任重必須致遠期乾乾悚愓弗差池欽惟德化偏邪類野犴搏為踞地獅白雲云禪者智能多見於已然不能見於未然止觀定慧防於未然之前作止任滅覺於已然之後拈云已然能覺者少況未然前能有幾個着眼又云定慧之學正好與作滅者為隄防頌云一念未萌親見徹莊嚴萬行祥光結更從靜寂衍摩訶的是禪門中俊傑晦堂心云謀在多斷在獨謀在多可以觀利害之極致斷在我可以定叢林之是非拈云能謀能斷精於幹辦庶無虞覆公餗焉頌云集輿議而果決裁權衡在握鎮三台肅清魔孽光天下佇看紅爐菡萏開黃龍南云夫人語默舉措上不欺天外不欺人內不欺心誠可謂之得矣拈云祇這不欺便是末法做長老之正戒頌云直行竟無些委曲空王殿上銘圖籙嗟哉瞞昧勿顛狂顛落鐵圍冤酷毒黃龍云先聖建叢林陳紀綱立名位選擇有道德衲子命曰長老將行其道德非苟竊是名也拈云若無道德謂之盜跖一笑頌云尸位素餐猶可恕悲傷毀紀壞倫常擇人不慎屬淫污遺臭萬年非吉祥黃龍云道如山愈升而愈高如地愈行而愈遠學者卑淺盡其力而止惟有志於道者乃能窮其高遠拈云今之志道天上揀月相似可不哀哉頌云憐彼半途而廢捐携歸故國力加鞭窮高極遠終須到七佛何妨並臂肩英邵武每見恣肆不懼因果嘆云勞生如旅泊住則隨緣去則亡矣彼所得能幾何爾輩不識廉恥干犯名分汙瀆宗教乃至如是拈云無廉恥者不勝呵責視之路人可也頌云迅速光陰計久長聚財買院占山場生前用盡機關巧死後紛爭競睨墻英邵武云大丈夫志在弘祖道誘掖後來不應私擅己慾無所避忌媒一身之禍造萬劫之殃三途地獄未是苦袈裟下失却人身實是苦拈云聘私慾而失人身不名為大丈夫警之頌云檢校宗師當正己形端影直完全美遼天鼻孔拄叢林虎嘯龍吟風霧起英邵武謂晦堂云末法比丘不修道德往往苞苴骯𩪝搖尾乞憐追求聲利於權勢之門一旦業盈福謝天人厭之拈云是皆穿窬之類也頌云交結俗情施廣譽夤緣造業誰憂慮閻王打算罪難逃帶角披毛償債去真淨文云末法比丘鮮有節義每見高談濶論人莫能及逮一飯之惠則始異終輔先毀後譽求其是曰是非曰非中正而不隱者少矣拈云予以中正遭訕而是非定論雖老衲未甞判斷悲夫頌云活弄魚腮被釣鈎寧思濁派與清流委身領命從差撥遮掩目前過亦休湛堂準謂妙喜云像季比丘外多狥物內不明心縱有弘為皆非究竟葢所附卑猥而使然拈云人人闡法個個攀緣是心狥物耶抑物狥心耶請辨看頌云擔沙擬欲塞窮坑枉費神輸鬼運情本有靈明罔照顧隨波逐浪可憐生湛堂云道者古今正權善弘道者要在變通不知變者拘文執教滯相殢情此皆不達權變拈云通方則能行權若達此者道不其在茲乎頌云離名離相尤圓變祖意佛心穿一串霸柄端然在手中挽回衰敝羨稱善湛堂謂妙喜云參禪須要識慮高遠志氣超邁出言行事持信於人勿隨勢利苟枉自不為朋輩描摸時所上下拈云罕遇其人頌云倜儻禪和世莫覊大方濶步表型儀雖當出類獨超萃維攬化權賴主持靈源清謂長靈卓云道行有時慈明放意荊楚含恥忍垢見者忽之明笑曰連城與瓦礫相觸予固知不勝矣逮見神鼎譽播叢林終起臨濟之道拈云陸沉下板渾無識坐斷人天眾自欽頌云忍辱藏珍不值錢時逢別寶布遙傳寄言有麝自香馥何必當風卓立焉靈源謂黃魯直云平居燕處罕以生死禍患為慮一旦事出不測方頓足扼腕而捄之終莫能濟拈云人無遠慮必有近憂頌云默運玄機未兆先消灾長享太平年驕奢淫佚禍胎就徙倚枯桑哭淚漣靈源謂古和尚云禍福相倚吉凶同域惟人自召安可不思拈云故君子必慎其獨也頌云三界惟心造作成安危得失總提衡應知地斡天回轉尤藉大雄重鼎盟靈源謂程伊川云多難成其志無難喪其身故君子安不忘危理不忘亂拈云經磨難而成器者方領略這般語話又云亦是處世治身之要訣頌云坦行常自密防蹎曾歷崎嶇路勉旃須信佛因魔鍛鍊銅睛鐵脊鎮三千靈源云住持位過其任者鮮克有終葢福德淺薄量度狹隘聞見鄙陋又不能從善務義以自廣而致然拈云正所謂小船不堪重載頌云羊裹虎皮亦露斑哀憐本質祇孱孱崇朝適意坡前草爭覺斷雲去復還靈源云近世長老涉二種緣智識不明喪於法體一應逆緣多觸衰風二應順緣多觸利風既為二風所觸則喜怒之氣交於心鬱勃之色浮於面致取辱法門譏誚賢達拈云因衰求利嗜利遭衰苟有風吹不動真可謂之賢達頌云一葉扁舟泛渺茫看風順逆駕桅航定將柁柄能回互濟度閻浮過樂鄉圓悟勤云人誰無過過而能改善莫大焉惟智者能改過遷善而愚者多蔽過飾非拈云改過不吝轉愚成智爭奈不自其過何頌云執見偏而善弗遷逞蠻負強日招愆從新革去舊時習枉則直兮曲則全圓悟謂妙喜云夫人舉措當謹終如始則無敗事昔晦堂老叔云黃檗勝和尚亦奇衲子但晚年謬耳觀其始得不謂之賢拈云始終如一必屬謹慎之家又云末後一著並未有人參取頌云初當矯舉後因循敝至乖違惹厭嗔鑑古晚年差謬語博文約禮護終身佛鑑懃謂佛燈珣云高上之士不以名位為榮達理之人不為抑挫所困其有承恩而效力見利而輸誠皆中人以下之所為拈云表上士之長揭下劣之短佛鑑一言以為智矣頌云榮辱蔑移君子志眼空世界閒游戲知恩報德受牢羅竟屬趨承遵命使佛鑑云白雲師翁甞謂凝侍者曰守道安貧衲子素分以窮達得喪移其所守者未可語道也拈云至哉守道之言却為改節者規誡頌云自古身貧道不貧芒鞋竹杖脫離塵苟非摩厲貞操守逐境生情孰認真佛鑑云為道不憂則操心不遠處身常逸則用志不大古人歷艱難甞險阻然後享終身之安拈云一有安享之念而遠大且休言矣頌云志從艱險磨堅固道為勤勞專意注嬴得白眉稱最良令人渴仰好遭遇佛眼遠云蒞眾之容必肅於閒暇之日對賓之語當嚴於私昵之時拈云在私閒而精謹即是退身遠害之策又云所言必如所行何向背之有頌云正色尤能慎語言大庭廣眾儼為尊更於入室投機處嚴密欽崇樹法門佛眼云學者不可泥於文字語言葢文字語言依他作解障自悟門不能出言象之表拈云悟了而依解作活計者毋乃障生死門乎思之頌云名理由來礙淨見掃清知解本光現謂其寂照遍河沙仍舊鼻根浮上面佛眼謂高菴云人情不制則肆亂故去情息妄禁惡止邪不可一時亡規矩拈云能以規矩制人而自己情妄反變亂可乎頌云妄盡情消覺妙明一行一步合元成依茲軌則隆治御樂業安家賀太平高菴悟云予初遊祖山見佛鑑小參謂貪欲瞋恚過如冤賊當以智敵之時雖年少心知其為善知識遂求挂搭拈云有智纔為善知識其奈貪嗔賊打併不去何頌云參至愛憎惟滅度用心排遣精英露何如靜處薩婆訶扎定脚跟生鐵鑄高菴云學者所存中正雖百折挫而浩然無憂其或所向偏邪朝夕區區為利是計予恐堂堂之軀將無措於天地之間矣拈云為利而無所措足終不若存正而無求者浩然天地間歟頌云翠柏凝寒挺不凋撑天直表特孤標溪花豈受風霜苦燦發前朝沒後朝高菴云道德仁義不獨古人有之今人亦有之以其妄想情念積習濃厚不能頓除所以不到古人地位耳拈云何不因有德有仁者而修持之徒甘自暴自棄也耶頌云就古評今差逈異真心妄逐邪心熾肯將習氣漸祛除決與先賢伸道義高菴退雲居圓悟欲治臥龍菴為燕休所菴云林下人苟有道義之樂形骸可外且西山廬阜林泉相屬皆予逸老之地何必有諸己然後可樂耶拈云此乃不牽累之舉然彼圖菴居而侈快樂者聆此能無媿于心歟頌云神超象外絕覊留隨便山林逸老休哂笑經營私己有房攤屋圮教誰修歸雲本云削弱風教莫甚於侫人雖端人正士巧為其所入拈云請問辨侫者誰頌云詭譎專行邪欲計敗綱壞紀相搖曳苟非察驗極精明蠱毒沾甞嗟待斃圓極岑云佛世之遠正宗淡薄叢林典型幾至掃地縱有扶捄返以為王蠻子拈云我道扶捄即是慈悲菩薩頌云守正維綸大丈夫捨身復舊機樞弗從尊重植師範徒聽差排賤作奴東山空云作長老居方丈只是前日空上座任緣而住不作明日計拈云任緣之語盟之座右頌云瓢笠住持雲水遶何當校慮緣多少本來面目昔猶今在處芳春啼樹鳥浙翁琰云今之踞方丈非特刮眾人鉢盂中物以恣口腹且將廣作人情冀遷大剎只恐他日鐵面閻老子與計筭拈云假賄賂而遷巨剎者聞此能不驚心頌云僧物濫支用匪公欺心自墮鐵圍籠任誇威勢岳山重業鏡高擡欵辨窮雪堂行云學道于外物淡然無所嗜好以至忘勢位去聲色似不勉而能拈云無欲之者其於聲勢殊非趨向何也方木不投圓竅頌云塵念息而道念勝肉團壁立萬千仞榮華富貴如浮雲寂寞禪關常䇿進死心新云節儉放下最為入道捷徑拈云放下則道自現前入之一字也不消得頌云省事端為了事人雍容行止正純真毋論城外長安底蹴盡江梅喜早春死心謂湛堂云學者有才識忠信節義者上也其才雖不高謹而有量者次也其或懷邪觀望隨勢改易此真小人也拈云鑑別人才還他死心爭奈忠謹少而小人多何頌云斫額英賢希間世痛傷奸偽直流涕縱饒慈誨善陶鎔結習成風終莫制草堂清云住持要在戒謹其偏聽自專之獘拈云敢問居位者免此二獘否頌云讒言入耳易乖憎違逆眾心恃己能致令孤危乏替代寒暑苦應承草堂云住持要在審察人情周知上下拈云智者能察而知之愚則反是頌云體勘羣情商可否根機勝劣由分剖就斯方便順提携敢保天長延地久山堂震初却曹山之命郡守移文勉之堂辭云若使飯粱囓肥作貪名之衲子不若草衣木食為隱山之野人拈云貪名之譏正中今時衲子之病而木食以終身者亦未必有也頌云見利惟思義足遵優游物表逈超倫置身丘壑非枯槁道在深巖許遠親山堂云天下事不可極意極意則禍亂拈云極意之事皆無恥之所為頌云勢窮力極生憂患安分自治休幹辦留著有餘不盡情重陽猶見菊花綻妙喜杲云愛惡異同人之常情惟賢達高明不被其所轉拈云真果明達猶能轉他頌云識廣量寬察輿衷任其參錯斷由中早知性海翻波浪把定柁梢船路通妙喜云諸方舉長老須舉守道而恬退者則志節堅所至成就叢林主法以救今日之獘狡侫之徒不知羞恥自能諂奉勢位結托于權貴之門又何須舉拈云名之曰舉斷非偏私而受結托也明矣然有似道而實奸者舉之又作麼生頌云捄弊必須具正眼僅推恬退亦擔版赤心片片會人稀徒使卞和懷玉潸音首座謂萬菴云稱善知識當洗濯其心以至公正接納四來拈云公正善知識當事如父母頌云山邊水際滌心邪應物光明最可嘉那似兜三并搭五貿門如市鬧紛譁音首座云住持孰不欲建立叢林而鮮克振者以其忘道德廢仁義捨法度任私情而致然拈云狥私住持莫論德義即有法皆偏僻之舉頌云狼犴叢林狼犴聚呼羣集類相依怙祇圖牽引誘名稱祖道高低都莾鹵萬菴顏和尚節儉以小參普說當供衲子間有竊議者菴曰朝饗膏粱暮厭麤糲人之常情汝等既念生死事大而相求於寂寞之濵當思道業未辦去聖時遙詎可朝夕事貪饕耶拈云既為生死則一飽亦當慙愧而議節儉者盡皆貪饕之流頌云朴素渾堅越異常冷爐迸出燦金剛便將珍重百千價爭甚礲邊粃與糠辯首座謂混融云衲子內無實德外恃華巧猶敗漏船盛塗丹雘使偶人駕於陸地信然可觀一旦涉江湖犯風濤得不危乎拈云衲子委靡懼怕風浪一生功業無成于以排樣則可頌云聰明弄巧芽兒戲當甚麼經綸大事戡亂返治折作家泛舟河漢行平地佛智云意識流浪不敢攀緣者覺照之力也拈云難道日嗜攀緣殊無一刻覺照歟頌云奔馳業識起於迷被境風吹著處栖若肯返觀親點檢倒騎木馬上金梯水菴一云古德住持率己行道未甞苟簡自恣拈云今之苟簡不知何以為己頌云嚴重自治標軌格法門挺立尊巨擘惜哉欺罔恣貪婪曳尾烏龜徒拂迹或謂月堂昌行道經年門下未聞有弟子得不辜妙湛乎堂云諸方老宿提挈衲子不觀其道業內充才器宏遠止欲速其為人逮審其道德則淫汙察其言行則乖戾謂其公正則邪侫予深恐識者笑故不為也拈云恁麼揀擇驢年得人去又云若有一節可取則成就他法之興廢殆其數耳頌云意投心領遽相傾寧顧乖淫乏正誠逼去為人祈學好蝦蟇比擬變鯤鯨心聞賁云教外別傳之道至簡至易初無它說拈云習累堆而受艱難者付之一笑頌云剗削葛藤傳直指伏惟見性休歸止支離亂扯別言詞黑是墨兮白是紙簡堂機住鄱陽筦山隆冬值雪饘粥不繼如不見聞有頌曰地爐無火客囊空雪似楊花落歲窮衲帔蒙頭燒榾柮不知身在寂寥中拈云觀其吟雪詩之興趣也不見寂寥頌云甘貧樂道倚巖隈慣把虗空掘地煨煉到情思毫末盡勿嫌衲帔積塵灰拙菴光云率身臨眾要以智遣妄除情須先覺拈云智之與覺衲僧最喫緊契此者能有幾個頌云制度權宜皆合節秉公昭鑑無差別如斯知識主稠林秋月淨輝光皎潔拙菴云末學膚受徒貴耳賤目終莫能究其奧妙拈云若口傳耳授不具眼目無過學語之流頌云嘴皮邊掇拾將來填入胸田結禍胎害殺一生純是瞎盲撞到髑髏堆密菴傑云住持有三莫事繁莫懼無事莫尋是非莫辨住持人達此三者則不被外物惑拈云慎守家門事事在心所云莫者毋乃省事而照管本等乎又云責人不如責己頌云當涖眾而淘念慮全身放下惟寬恕靜看蒼狗白雲生何異春堤飛柳絮密菴云衲子履行傾邪素有不善之迹叢林互知此不足疾惟眾人謂之賢而內實不肖者誠可疾也拈云似賢而實不肖正邪侫之輩所以能惑眾也又云若將不肖認做賢更疾阿誰頌云切齒權奸遺累深揭其僥險示為箴叮嚀海眾應知警喫飯咬砂痛孰禁自得輝云衲子誠而向正雖愚亦可用侫而懷邪雖智終為害拈云舍智而近愚不特避害實乃勸勉誠正之訓焉頌云謹恪依規恒不苟托輕謀重終無負若夫棄義役刁鑽𦘕未成狸侵類狗丞相錢象先以天封招提勉或菴體出世菴云我不解懸羊頭賣狗肉也即宵遁拈云不作這個行家且置還是林下一人麼頌云閒散懶於普應酬孤巒踞傲免馳求但隨社火賊身露難避業緣纏脚頭或菴住蘇州報覺小參言前薦得屈我宗風句下分明沉埋佛祖雖然行到水窮處坐看雲起時拈云今日雲起也且看或菴拖泥帶水頌云言句併同蹤跡現嘵嘵嬴個破荒院雖然嘯虎解呼風屈辱真人塵滿面瞎堂遠云學道之士要先正其心然後可以正己正物拈云敢問心作麼生正莫是不私己不逐物是正麼有什麼交涉頌云一切無心心自靈周旋萬變事皆成盡云神用善圜轉校正元明氷潔清慈受深謂徑山訥云年來禪門蕭索諸方分烟散眾惟師兄神情不動自非道充德實行解相應豈多得也拈云道德之士往往窮廝煎餓廝炒何為稀罕頌云恬淡絕營時自若年饑歲饉常安樂倘非充實蘊其中值遇凶荒愁落薄靈芝照云予以愚拙不喜諂附遂為人讒謗拈云虎落平陽被犬欺頌云率直居方弗入流慍于羣小造愆尤曾聞含血仰天唾徒污己身深可憂懶菴樞云學道當以悟為期求真善知識決擇絲頭情見不盡即是生死根本拈云悟道不了生死純是情見即情見盡而猶生死者請以決之真善知識頌云覺知剔脫不生滅并復游情消阻折腦後圓光似鏡瑩佛陀耶是他行列
